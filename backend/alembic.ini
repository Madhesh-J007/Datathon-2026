# Alembic configuration file.
# Purpose: migration environment settings (script location, DB URL source).
# Used by: `alembic revision`, `alembic upgrade head`.
# NOTE: sqlalchemy.url is intentionally left blank here - it is injected
# from app.core.config.settings inside alembic/env.py at runtime, so the
# real connection string lives only in .env, never in this file.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
